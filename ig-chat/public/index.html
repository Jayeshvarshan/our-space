<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Space</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</head>

<body>
    <div class="app-container" style="display: none;" id="main-app">

        <!-- ====== CHAT LIST VIEW ====== -->
        <div class="view" id="view-chat-list">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <img src="" alt="Me" class="avatar-small" id="current-user-avatar">
                    <span class="header-username" id="sidebar-username">Username</span>
                    <i class="ph ph-caret-down" style="font-size:14px; color: var(--text-secondary);"></i>
                </div>
                <i class="ph ph-note-pencil header-icon" title="New Message"></i>
            </header>

            <!-- Search -->
            <div class="search-container">
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="user-search-input" placeholder="Search">
                </div>
            </div>

            <!-- Chat List -->
            <div class="chat-list" id="chat-list">
                <div class="loading-text">Loading chats...</div>
            </div>
        </div>

        <!-- ====== ACTIVE CHAT VIEW ====== -->
        <div class="view hidden" id="view-active-chat">
            <!-- Chat Header -->
            <div class="chat-window-header">
                <div class="header-left">
                    <button class="back-btn" id="back-btn"><i class="ph ph-arrow-left"></i></button>
                    <img src="" alt="User" class="avatar-small" id="header-avatar">
                    <div>
                        <div class="header-name" id="header-name">Select a chat</div>
                        <div class="header-status" id="header-status">Active</div>
                    </div>
                </div>
                <div class="header-actions">
                    <i class="ph ph-phone"></i>
                    <i class="ph ph-video-camera"></i>
                </div>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chat-messages"></div>

            <!-- Input Area -->
            <div class="message-input-area">
                <div class="input-container">
                    <i class="ph ph-smiley"></i>
                    <input type="text" placeholder="Message..." id="message-input" autocomplete="off">
                    <div class="input-actions">
                        <i class="ph ph-microphone"></i>
                        <i class="ph ph-image"></i>
                        <i class="ph ph-heart"></i>
                    </div>
                    <button id="send-btn" class="hidden">Send</button>
                </div>
            </div>
        </div>

        <!-- ====== BOTTOM NAVIGATION ====== -->
        <nav class="bottom-nav" id="bottom-nav">
            <a href="#" class="nav-item"><i class="ph ph-house"></i></a>
            <a href="#" class="nav-item"><i class="ph ph-play-circle"></i></a>
            <a href="#" class="nav-item active"><i class="ph-fill ph-paper-plane-tilt"></i></a>
            <a href="#" class="nav-item"><i class="ph ph-magnifying-glass"></i></a>
            <a href="#" class="nav-item" id="profile-nav">
                <img src="" alt="Me" class="nav-avatar" id="current-user-name">
            </a>
            <a href="#" class="nav-item" id="logout-btn"><i class="ph ph-sign-out"></i></a>
        </nav>

    </div>
    <script src="script.js"></script>
</body>

</html>
